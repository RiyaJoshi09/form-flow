<h2 mat-dialog-title class="text-xl font-semibold text-red-600 flex items-center gap-2">
  ⚠️ Confirm Delete
</h2>

<mat-dialog-content class="mt-2 text-gray-700">
  <p class="font-medium">Are you sure you want to delete this form?</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="mt-4 flex gap-3">
  <button 
    mat-stroked-button 
    (click)="onCancel()"
    class="px-4 py-1.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 transition"
  >
    Cancel
  </button>

  <button 
    mat-raised-button 
    (click)="onConfirm()"
    class="px-4 py-1.5 rounded-lg bg-red-600 text-white hover:bg-red-700 transition shadow"
  >
    Delete
  </button>
</mat-dialog-actions>
