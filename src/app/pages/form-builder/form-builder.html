<div class="flex h-screen flex-col bg-gray-100">
  <div class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
    <input [(ngModel)]="formTitle" class="text-xl font-bold border-none focus:ring-0" placeholder="Form Title">
    <div class="flex gap-4">
      <button mat-stroked-button color="accent" (click)="addSection()">
        <mat-icon>add_to_photos</mat-icon> Add Section
      </button>
      <button mat-raised-button color="primary" (click)="saveForm()">
        <mat-icon>save</mat-icon> Save Form
      </button>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <div class="w-64 bg-white border-r p-4 overflow-y-auto">
       <h3 class="text-sm font-semibold text-gray-500 uppercase mb-4">Form Elements</h3>
       <div *ngFor="let tool of elements" 
            class="p-4 border rounded-lg cursor-pointer hover:bg-indigo-50 mb-3"
            (click)="addField(tool, 0)"> {{ tool.label }}
       </div>
       <p class="text-xs text-gray-400 mt-4 italic">Note: Fields will be added to Section 1 by default. Drag function is yet to add.</p>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
      <div class="max-w-3xl mx-auto flex flex-col gap-10">
        
        <div *ngFor="let section of formSections; let sIndex = index" 
             class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
          
          <div class="bg-gray-50 p-4 border-b flex justify-between items-center">
            <input [(ngModel)]="section.title" class="bg-transparent font-bold text-lg border-none focus:ring-1 focus:ring-indigo-300 rounded px-2">
            <button mat-icon-button color="warn" (click)="removeSection(sIndex)" [disabled]="formSections.length === 1">
              <mat-icon>delete_sweep</mat-icon>
            </button>
          </div>

          <div class="p-6 min-h-[150px]">
            <div *ngFor="let field of section.fields; let fIndex = index" class="group relative p-4 mb-4 bg-white border rounded-lg hover:border-indigo-300">
              <div class="absolute right-2 top-2 hidden group-hover:flex gap-1">
                <button (click)="editField(sIndex, fIndex)" mat-icon-button color="primary"><mat-icon>edit</mat-icon></button>
                <button (click)="removeField(sIndex, fIndex)" mat-icon-button color="warn"><mat-icon>delete</mat-icon></button>
              </div>
              <label class="block text-sm font-semibold mb-2">{{ field.label }}</label>
              <input class="w-full p-2 border rounded bg-gray-50" [type]="field.type" disabled>
            </div>

            <div *ngIf="section.fields.length === 0" class="text-center py-10 border-2 border-dashed border-gray-100 text-gray-400">
              No fields in this section.
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
