<div class="flex h-screen flex-col bg-gray-100">
  <div class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
    <input [(ngModel)]="formTitle" class="text-xl font-bold border-none focus:ring-0" placeholder="Form Title">
    <div class="flex gap-4">
      <button mat-stroked-button color="accent" (click)="addSection()">
        <mat-icon>add_to_photos</mat-icon> Add Section
      </button>
      <button mat-raised-button color="primary" (click)="saveForm()">
        <mat-icon>save</mat-icon> Save Form
      </button>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <div class="w-64 bg-white border-r p-4 overflow-y-auto" cdkDropList id="sidebar" #sidebarList="cdkDropList"
      [cdkDropListConnectedTo]="sectionsIds" [cdkDropListData]="elements" [cdkDropListSortingDisabled]="true">
      <h3 class="text-sm font-semibold text-gray-500 uppercase mb-4">Form Elements</h3>
      <div *ngFor="let tool of elements" cdkDrag [cdkDragData]="tool"
        class="p-4 border rounded-lg cursor-pointer hover:bg-indigo-50 mb-3 transition-all active:cursor-grabbing">
        <div class="flex items-center gap-3">
          <mat-icon class="text-slate-400">drag_indicator</mat-icon>
          <span class="text-sm font-semibold text-slate-600">{{ tool.label }}</span>
        </div>

        <div *cdkDragPlaceholder class="border-2 border-dashed border-indigo-200 bg-indigo-50 rounded-xl h-12"></div>
      </div>
      <p class="text-xs text-gray-400 mt-4 italic">Drag and Drop elements directly into any section to add them.</p>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
      <div class="max-w-3xl mx-auto flex flex-col gap-10" cdkDropList [cdkDropListData]="formSections" (cdkDropListDropped)="onSectionDrop($event)">

        <div *ngFor=" let section of formSections; let sectionIndex=index" cdkDrag
          class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">

          <div class="bg-gray-50 p-4 border-b flex justify-between items-center">
            <mat-icon cdkDragHandle class="cursor-move text-gray-400">
              drag_indicator
            </mat-icon>
            <input [(ngModel)]="section.title"
              class="bg-transparent font-bold text-lg border-none focus:ring-1 focus:ring-indigo-300 rounded px-2">
            <div class="flex gap-1">
              <button mat-icon-button color="primary" (click)="duplicateSection(sectionIndex)"
                title="Duplicate Section">
                <mat-icon>content_copy</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="removeSection(sectionIndex)"
                [disabled]="formSections.length === 1">
                <mat-icon>delete_sweep</mat-icon>
              </button>
            </div>
          </div>

          <div class="p-6 min-h-[150px]" cdkDropList [id]="section.id" [cdkDropListData]="section.fields"
            [cdkDropListConnectedTo]="[sidebarList, ...sectionsIds]"
            (cdkDropListDropped)="onDrop($event, sectionIndex)">
            <div *ngFor="let field of section.fields; let fieldIndex = index" cdkDrag class="group relative p-6 mb-6 bg-white border border-slate-200 rounded-2xl hover:border-indigo-200
            hover:shadow-md transition-all">

              <div class="mb-4">
                <mat-icon cdkDragHandle class="text-slate-300 cursor-move text-base">drag_handle</mat-icon>
                <input [(ngModel)]="field.label"  [ngStyle]="{
                                                        'font-size': field.fontSize,
                                                        'font-weight': field.bold ? 'bold' : 'normal',
                                                        'font-style': field.italic ? 'italic' : 'normal',
                                                        'text-decoration': field.underline ? 'underline' : 'none',
                                                        'color': field.color
                                                         }"
                  class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-transparent border-none focus:ring-1 focus:ring-indigo-100 rounded w-full p-1"
                  placeholder="CLICK TO EDIT LABEL">
              </div>

              <div class="opacity-80">
                <app-builder-input-text *ngIf="field.type === 'text' || field.type === 'number'"
                  [bluePrint]="field"></app-builder-input-text>

                <app-builder-file-upload *ngIf="field.type === 'file-upload'" [bluePrint]="field">
                </app-builder-file-upload>

                <app-builder-check-box *ngIf="field.type === 'checkbox'" [bluePrint]="field">
                </app-builder-check-box>

                <app-builder-radio-button *ngIf="field.type === 'radio-button'" [bluePrint]="field">
                </app-builder-radio-button>

                <app-builder-select-card *ngIf="field.type === 'select-card'" [bluePrint]="field">
                </app-builder-select-card>

                <app-builder-textarea *ngIf="field.type === 'text-area'" [bluePrint]="field">
                </app-builder-textarea>

              </div>

              <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button (click)="duplicateField(sectionIndex, fieldIndex)"
                  class="p-1.5 text-slate-400 hover:text-indigo-600">
                  <mat-icon class="text-sm">content_copy</mat-icon>
                </button>
                <button (click)="editField(sectionIndex, fieldIndex)"
                  class="p-1.5 text-slate-400 hover:text-indigo-600">
                  <mat-icon class="text-sm">settings</mat-icon>
                </button>
                <button (click)="removeField(sectionIndex, fieldIndex)" class="p-1.5 text-slate-400 hover:text-red-500">
                  <mat-icon class="text-sm">delete</mat-icon>
                </button>
              </div>
              <div *cdkDragPlaceholder
                class="border-2 border-dashed border-indigo-100 bg-indigo-50/30 rounded-2xl h-32 mb-6"></div>
            </div>

            <div *ngIf="section.fields.length === 0"
              class="flex flex-col items-center justify-center py-12 border-2 border-dashed border-slate-100 text-slate-300 rounded-xl">
              <mat-icon class="mb-2">add_circle_outline</mat-icon>
              <p class="text-xs font-bold uppercase tracking-widest">Drop elements here</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
