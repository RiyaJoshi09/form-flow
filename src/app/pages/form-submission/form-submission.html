<div class="min-h-screen bg-surface py-12 px-4 transition-colors duration-300">
  
  <div class="max-w-3xl mx-auto bg-container shadow-xl rounded-3xl overflow-hidden border border-theme">
    
    <div class="bg-primary p-10 text-black ">
      <h1 class="text-3xl font-bold text-white rounded-t-lg">{{ formStructure?.title }}</h1>
      <p class="opacity-80 mt-2 text-white">Please fill out the details below accurately.</p>
    </div>

    <form [formGroup]="formGroup" (ngSubmit)="submitResponse()" class="p-10">
      <div *ngFor="let section of formStructure?.sections" class="mb-12">
        <h2 class="text-xl font-bold text-primary mb-6 border-b pb-2 border-theme ">
          {{ section.title }}
        </h2>

        <div *ngFor="let field of section.fields" class="mb-8">
          <label class="block text-sm font-bold text-muted uppercase tracking-wider mb-2">
            {{ field.label }}
            <span *ngIf="field.validations?.required" class="text-red-500">*</span>
          </label>

          <div [ngSwitch]="field.type">
            <app-input-text *ngSwitchCase="'text'" [fieldConfig]="field" [control]="getControl(field.id)"></app-input-text>
            <app-check-box *ngSwitchCase="'checkbox'" [fieldConfig]="field" [control]="getControl(field.id)"></app-check-box>
            <app-file-upload *ngSwitchCase="'file-upload'" [fieldConfig]="field" [control]="getControl(field.id)"></app-file-upload>
            <app-radio-button *ngSwitchCase="'radio-button'" [fieldConfig]="field" [control]="getControl(field.id)"></app-radio-button>
            <app-select-card *ngSwitchCase="'select-card'" [fieldConfig]="field" [control]="getControl(field.id)"></app-select-card>
            <app-textarea *ngSwitchCase="'text-area'" [fieldConfig]="field" [control]="getControl(field.id)"></app-textarea>
          </div>

          <div *ngIf="formGroup.get(field.id)?.invalid && formGroup.get(field.id)?.touched" 
               class="text-red-500 text-xs mt-2 italic flex items-center gap-1">
            <mat-icon class="text-sm scale-75">error_outline</mat-icon>
            This field is required or formatted incorrectly.
          </div>
        </div>
      </div>

      <button type="submit" 
              [disabled]="formGroup.invalid"
              class="w-full btn-primary font-bold py-4 rounded-2xl transition-all shadow-lg hover:opacity-90 disabled:opacity-50 disabled:grayscale">
        SUBMIT RESPONSE
      </button>
    </form>
  </div>
</div>
