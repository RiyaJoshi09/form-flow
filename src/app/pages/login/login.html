<div class="flex h-screen items-center justify-center bg-gray-100">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800">FormFlow</h1>
      <p class="text-sm text-slate-500 mt-1">Login to your account</p>
    </div>

    <form (ngSubmit)="onLogin()" class="flex flex-col gap-5">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="username"
          name="username"
          required
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
        />
      </mat-form-field>

      <button
        mat-raised-button
        type="submit"
        class="w-full h-11 text-base font-semibold btn-primary opacity-90 hover:opacity-100 cursor-pointer">
        Login
      </button>
    </form>

  </div>
</div>
