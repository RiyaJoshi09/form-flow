<mat-form-field appearance="outline" class="w-full">
  <textarea
    matInput
    rows="4"
    [formControl]="control"
    [placeholder]="fieldConfig.placeholder || 'Enter here'">
  </textarea>

  @if (control?.hasError('required')) {
    <mat-error>This field is required</mat-error>
  }
</mat-form-field>
