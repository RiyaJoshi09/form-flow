@if(control?.hasError('required')){
  <mat-error>Required</mat-error>
}
<div
  (click)="fileInput.click()"
  class="flex items-center justify-between px-4 py-2 border border-theme rounded-lg cursor-pointer hover:outline-1 transition">
  <span class="text-gray-500 text-sm">
    {{ control?.value?.name || 'Choose a file...' }}
  </span>

  <span class="text-primary text-sm font-medium">
    Browse
  </span>
</div>

<input
  type="file"
  #fileInput
  class="hidden"
  (change)="onFileChange($event)"
/>
