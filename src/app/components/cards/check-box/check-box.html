<label class="block mb-2 font-medium">
  {{ fieldConfig.label }}
</label>

<div>
  @for (option of fieldConfig.config.options; track option) {
    <mat-checkbox
      [checked]="control.value.includes(option)"
      (change)="onChange(option, $event.checked)">
      {{ option }}
    </mat-checkbox>
  }
</div>
