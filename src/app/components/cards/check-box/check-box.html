<div class="flex flex-col">
  @for (option of fieldConfig?.options; track $index) {
    <mat-checkbox
      [checked]="control?.value?.includes(option)"
      (change)="onChange(option, $event.checked)">
      {{ option }}
    </mat-checkbox>
  }
  @if(control?.value?.length == 0){
    <mat-error class="text-red-500">* Required Field</mat-error>
  }
</div>
