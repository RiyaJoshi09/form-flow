<div class="flex h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-primary">FormFlow</h1>
      <p class="text-sm text-slate-500 mt-1">Recover your account</p>
    </div>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Username or Email</mat-label>
      <input matInput type="text" [(ngModel)]="credential" name="email" required />
    </mat-form-field>
    @if (takeOtp()) {
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>OTP</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="otp"
          name="otp"
          required
          placeholder="x x x - x x x"
          minlength="6"
          maxlength="6"
        />
      </mat-form-field>
      <div class="flex justify-end items-start">
        <button
          (click)="submit()"
          class="text-muted hover:text-primary text-sm font-medium underline opacity-70 cursor-pointer hover:opacity-100"
        >
          Resend OTP?
        </button>
      </div>
    }
    <div class="mt-6"></div>
    @if (takeOtp()) {
      <button
        (click)="verifyOtp()"
        class="w-full h-11 text-base font-semibold btn-primary opacity-90 hover:opacity-100 cursor-pointer"
      >
        Verify Otp
      </button>
    } @else {
      <button
        (click)="submit()"
        class="w-full h-11 text-base font-semibold btn-primary opacity-90 hover:opacity-100 cursor-pointer"
      >
        Send Otp
      </button>
    }
  </div>
</div>
