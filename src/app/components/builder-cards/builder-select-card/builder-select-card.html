<mat-form-field appearance="outline" class="w-full">

  <mat-select>
    @for (option of bluePrint.options; track option) {
      <mat-option [value]="option">
        {{ option }}
      </mat-option>
    }
  </mat-select>

  @if(bluePrint.validation?.required){
    <mat-error>Required Field</mat-error>
  }
</mat-form-field>
