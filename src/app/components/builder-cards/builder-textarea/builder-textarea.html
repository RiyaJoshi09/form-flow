<mat-form-field appearance="outline" class="w-full">
  <textarea matInput rows="4" [placeholder]="fieldData.placeholder ?? 'Input here...'"> </textarea>
</mat-form-field>
@if (fieldData.validations?.required) {
  <div class="flex justify-start items-end">
    <mat-icon [style.color]="'var(--mat-sys-on-surface-variant)'" style="font-size: 16px;" class="relative top-1">check_circle_outline</mat-icon>
    <span class="text-primary capitalize italic font-medium opacity-60">Required</span>
  </div>
}
@if (fieldData.validations?.minLength ?? 0) {
  <div class="flex justify-start items-end">
    <mat-icon [style.color]="'var(--mat-sys-on-surface-variant)'" style="font-size: 16px;" class="relative top-1">notes</mat-icon>
    <span class="text-primary capitalize italic font-medium opacity-60"
      >Minimum Length: <span class="text-muted">{{ fieldData.validations?.minLength }}</span></span
    >
  </div>
}
@if (fieldData.validations?.maxLength) {
  <div class="flex justify-start items-end">
    <mat-icon [style.color]="'var(--mat-sys-on-surface-variant)'" style="font-size: 16px;" class="relative top-1">notes</mat-icon>
    <span class="text-primary capitalize italic font-medium opacity-60"
      >Maximum Length: <span class="text-muted">{{ fieldData.validations?.maxLength }}</span></span
    >
  </div>
}
